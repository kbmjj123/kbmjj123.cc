<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="420" fill="#ffffff"/>

  <!-- Client -->
  <rect x="320" y="20" width="160" height="50" rx="8" fill="#1e293b"/>
  <text x="400" y="50" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="600">Client / Browser</text>

  <!-- Arrow down to Workers -->
  <line x1="400" y1="70" x2="400" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Workers -->
  <rect x="290" y="110" width="220" height="60" rx="8" fill="#f97316"/>
  <text x="400" y="135" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">Workers</text>
  <text x="400" y="155" text-anchor="middle" fill="#ffffff" font-size="12">Compute / App Logic</text>

  <!-- Arrows from Workers to 3 services -->
  <line x1="330" y1="170" x2="160" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="170" x2="400" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="470" y1="170" x2="640" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- D1 -->
  <rect x="60" y="250" width="200" height="70" rx="8" fill="#2563eb"/>
  <text x="160" y="278" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">D1</text>
  <text x="160" y="298" text-anchor="middle" fill="#ffffff" font-size="11">Relational data (SQL)</text>

  <!-- KV -->
  <rect x="300" y="250" width="200" height="70" rx="8" fill="#7c3aed"/>
  <text x="400" y="278" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">KV</text>
  <text x="400" y="298" text-anchor="middle" fill="#ffffff" font-size="11">Fast key-value lookups</text>

  <!-- R2 -->
  <rect x="540" y="250" width="200" height="70" rx="8" fill="#059669"/>
  <text x="640" y="278" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">R2</text>
  <text x="640" y="298" text-anchor="middle" fill="#ffffff" font-size="11">Object storage (images, files)</text>

  <!-- Footer note -->
  <text x="400" y="370" text-anchor="middle" fill="#64748b" font-size="12">One platform, one deployment story — no separate vendors to integrate</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
