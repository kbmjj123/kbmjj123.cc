<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="480" fill="#ffffff"/>

  <text x="40" y="35" font-size="15" font-weight="700" fill="#1e293b">Production: works fine</text>
  <rect x="40" y="50" width="140" height="44" rx="6" fill="#1e293b"/>
  <text x="110" y="77" text-anchor="middle" fill="#fff" font-size="12">Browser</text>
  <line x1="180" y1="72" x2="240" y2="72" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)"/>
  <rect x="240" y="50" width="140" height="44" rx="6" fill="#334155"/>
  <text x="310" y="77" text-anchor="middle" fill="#fff" font-size="12">GitHub OAuth</text>
  <line x1="380" y1="72" x2="440" y2="72" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)"/>
  <rect x="440" y="50" width="160" height="44" rx="6" fill="#059669"/>
  <text x="520" y="77" text-anchor="middle" fill="#fff" font-size="12">Production callback ✓</text>

  <text x="40" y="155" font-size="15" font-weight="700" fill="#1e293b">Local dev: callback never arrives</text>
  <rect x="40" y="170" width="140" height="44" rx="6" fill="#1e293b"/>
  <text x="110" y="197" text-anchor="middle" fill="#fff" font-size="12">Browser</text>
  <line x1="180" y1="192" x2="240" y2="192" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)"/>
  <rect x="240" y="170" width="140" height="44" rx="6" fill="#334155"/>
  <text x="310" y="197" text-anchor="middle" fill="#fff" font-size="12">GitHub OAuth</text>
  <line x1="380" y1="192" x2="440" y2="192" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#ax)"/>
  <rect x="440" y="170" width="160" height="44" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="520" y="197" text-anchor="middle" fill="#991b1b" font-size="12">Local server unreachable ✕</text>
  <text x="240" y="232" font-size="11" fill="#dc2626">network path to local callback blocked (CN network environment)</text>

  <text x="40" y="305" font-size="15" font-weight="700" fill="#1e293b">Local dev with mock endpoint: unblocked</text>
  <rect x="40" y="320" width="140" height="44" rx="6" fill="#1e293b"/>
  <text x="110" y="347" text-anchor="middle" fill="#fff" font-size="12">Browser</text>
  <line x1="180" y1="342" x2="240" y2="342" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)"/>
  <rect x="240" y="320" width="180" height="44" rx="6" fill="#f97316"/>
  <text x="330" y="340" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">/api/auth/dev-mock-login</text>
  <text x="330" y="354" text-anchor="middle" fill="#fff" font-size="9">(dev-only, env-gated)</text>
  <line x1="420" y1="342" x2="480" y2="342" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)"/>
  <rect x="480" y="320" width="180" height="44" rx="6" fill="#059669"/>
  <text x="570" y="347" text-anchor="middle" fill="#fff" font-size="12">Fake session ✓ → app continues</text>

  <text x="400" y="445" text-anchor="middle" fill="#64748b" font-size="12">Real OAuth is skipped entirely in local dev — only the resulting session state matters downstream</text>

  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
    <marker id="ax" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
