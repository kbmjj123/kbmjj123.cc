<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Empty · kbmjj123.cc</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg-deep: #0b0b12;
            --bg-card: #13131e;
            --border-pixel: #2a2a42;
            --text-primary: #e8edf5;
            --text-secondary: #9aa8c9;
            --text-muted: #4d5a7a;
            --accent-blue: #60a5fa;
            --accent-green: #4ade80;
            --accent-gold: #fbbf24;
            --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-pixel: 'Press Start 2P', monospace;
        }
        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 25px 25px, rgba(96,165,250,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text-primary);
            font-family: var(--font-ui);
            line-height: 1.7;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== 容器入场动画（上浮淡入） ===== */
        .empty-container {
            max-width: 600px;
            width: 100%;
            background-color: var(--bg-card);
            border: 2px solid var(--accent-blue);
            padding: 56px 40px 40px;
            text-align: center;
            position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(96,165,250,0.06);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.6s ease forwards;
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .empty-container::before {
            content: "";
            display: block;
            height: 3px;
            width: 100%;
            background: repeating-linear-gradient(90deg,
                    var(--accent-blue) 0px, var(--accent-blue) 6px,
                    transparent 6px, transparent 12px);
            margin-bottom: 28px;
            opacity: 0.6;
            /* 流动动画（与主站一致） */
            background-size: 24px 100%;
            animation: flowLine 4s linear infinite;
        }
        @keyframes flowLine {
            0% { background-position: 0 0; }
            100% { background-position: 24px 0; }
        }

        /* ===== 像素“+”图标（带呼吸脉冲） ===== */
        .empty-icon {
            display: inline-block;
            width: 64px;
            height: 64px;
            background: transparent;
            border: 4px solid var(--accent-blue);
            position: relative;
            margin-bottom: 24px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.4);
            animation: pulseIcon 2.4s ease-in-out infinite;
        }
        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.85; box-shadow: 0 0 12px rgba(96,165,250,0.2); }
        }
        .empty-icon::before,
        .empty-icon::after {
            content: "";
            position: absolute;
            background: var(--accent-blue);
        }
        .empty-icon::before {
            width: 4px;
            height: 40px;
            top: 12px;
            left: 30px;
        }
        .empty-icon::after {
            width: 40px;
            height: 4px;
            top: 30px;
            left: 12px;
        }

        /* ===== 标题与副标题渐入（延迟出现） ===== */
        .empty-title {
            font-family: var(--font-pixel);
            font-size: 18px;
            color: var(--accent-blue);
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeText 0.5s ease 0.15s forwards;
        }
        .empty-desc {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 28px;
            line-height: 1.8;
            opacity: 0;
            animation: fadeText 0.5s ease 0.3s forwards;
        }
        @keyframes fadeText {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== 按钮（与主站风格一致，悬停已有动效） ===== */
        .empty-btn {
            display: inline-block;
            font-family: var(--font-pixel);
            font-size: 11px;
            color: var(--accent-blue);
            background: transparent;
            border: 2px solid var(--accent-blue);
            padding: 10px 24px;
            text-decoration: none;
            transition: all 0.15s ease;
            box-shadow: 2px 2px 0 rgba(96,165,250,0.08);
            opacity: 0;
            animation: fadeText 0.5s ease 0.45s forwards;
        }
        .empty-btn:hover {
            background: var(--accent-blue);
            color: var(--bg-deep);
            box-shadow: 4px 4px 0 rgba(96,165,250,0.15);
        }

        .empty-footer {
            margin-top: 28px;
            font-family: var(--font-pixel);
            font-size: 9px;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeText 0.5s ease 0.6s forwards;
        }
        .empty-footer a {
            color: var(--text-secondary);
            text-decoration: none;
            border-bottom: 1px dashed var(--border-pixel);
            transition: color 0.15s;
        }
        .empty-footer a:hover {
            color: var(--accent-green);
        }

        @media (max-width: 480px) {
            .empty-container { padding: 32px 20px 28px; }
            .empty-title { font-size: 15px; }
            .empty-icon { width: 48px; height: 48px; }
            .empty-icon::before { height: 28px; top: 10px; left: 22px; }
            .empty-icon::after { width: 28px; top: 22px; left: 10px; }
        }
    </style>
</head>
<body>
    <div class="empty-container">
        <div class="empty-icon"></div>
        <h1 class="empty-title">✨ This space is empty</h1>
        <p class="empty-desc">
            No posts have been published yet.<br />
            Ready to write your first one?
        </p>
        <a href="index.html" class="empty-btn">✎ Create Post</a>
        <div class="empty-footer">
            <a href="index.html">← Back to home</a>
        </div>
    </div>
</body>
</html>
